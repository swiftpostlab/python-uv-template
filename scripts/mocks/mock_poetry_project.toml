[project]
name = "my-project"
version = "0.1.0"
description = ""
authors = [{ name = "Name Surname", email = "email@example.com" }]
readme = "README.md"
requires-python = ">=3.13,<4.0"
dependencies = []

[dependency-groups]
dev = ["pytest>=9.0", "black>=25.1.0", "pyright>=1.1.400"]

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{ include = "my_project", from = "src" }]

[tool.poetry.requires-plugins]
someplugin = "value"

[tool.pytest.ini_options]
minversion = "9.0"
addopts = "--import-mode=importlib"
testpaths = ["src", "scripts"]
python_files = ["*_test.py"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"

[project.scripts]
transition-to-uv = "scripts.transition_to_uv:main"
other-script = "my_project.main:main"
