[project]
name = "my-project"
version = "0.1.0"
description = ""
authors = [{ name = "Name Surname", email = "email@example.com" }]
readme = "README.md"
requires-python = ">=3.13,<4.0"
dependencies = [
  "rich==13.7.1",
  "requests>=2.32.3,<3.0.0",
  "httpx[http2]>=0.28.1,<0.29.0",
]

[dependency-groups]
dev = [
  "poethepoet>=0.34.0",
  "black>=25.1.0",
  "pyright>=1.1.400",
  "pytest>=9.0,<10.0",
  "mypy>=1.15.0,<2.0.0",
]
docs = ["mkdocs>=1.6.0", "mkdocstrings>=0.28.0,<0.29.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/my_project"]

[tool.pytest.ini_options]
minversion = "9.0"
addopts = "--import-mode=importlib"
testpaths = ["src", "scripts"]
python_files = ["*_test.py"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "strict"

[project.scripts]
other-script = "my_project.main:main"
